services:
  api:
    image: ghcr.io/amir734jj/stream-subscription-api:latest
    pull_policy: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ASPNETCORE_URLS=http://+:80
    restart: unless-stopped

  ui:
    image: ghcr.io/amir734jj/stream-subscription-ui:latest
    environment:
      - PROXY_URL=http://api:80
      - PORT=80
    ports:
      - "${UI_PORT:-0}:80"
    depends_on:
      - api
    restart: unless-stopped
